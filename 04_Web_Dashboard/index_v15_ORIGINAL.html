<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE MIRROR | v15.0 PREMIUM MASTER (10-PARTS ORIGINAL)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- [v15: 10개 모듈 체제 및 광폭 워크스페이스 원형] -->
    <div class="nebula-bg">
        <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    </div>

    <div class="main-wrapper">
        <header class="main-header">
            <div class="status-indicator">
                <div class="status-node"><span class="node-label">BRIDGE</span><div id="bridge-dot" class="node-dot"></div></div>
                <div class="status-node"><span class="node-label">ORACLE AI</span><div id="ollama-dot" class="node-dot online"></div></div>
                <div class="status-node"><span class="node-label">CPU</span><span id="cpu-usage" class="res-val">0%</span></div>
                <div class="status-node"><span class="node-label">RAM</span><span id="ram-usage" class="res-val">0%</span></div>
            </div>
            <h1 class="master-logo">SAGE MIRROR</h1>
            <p class="master-subtitle">ORACLE PRODUCTION COMMAND CENTER (v15)</p>
        </header>

        <main class="dashboard-grid" style="grid-template-columns: repeat(5, 1fr);">
            <div class="oracle-card" onclick="openModule('research')"><div class="card-content"><h3>RESEARCH</h3><p>분석</p></div></div>
            <div class="oracle-card" onclick="openModule('thumbnail')"><div class="card-content"><h3>THUMBNAIL</h3><p>비주얼</p></div></div>
            <div class="oracle-card" onclick="openModule('script')"><div class="card-content"><h3>SCRIPT</h3><p>대본</p></div></div>
            <div class="oracle-card" onclick="openModule('image')"><div class="card-content"><h3>IMAGE</h3><p>에셋</p></div></div>
            <div class="oracle-card" onclick="openModule('video')"><div class="card-content"><h3>VIDEO</h3><p>편집</p></div></div>
            <div class="oracle-card" onclick="openModule('voice')"><div class="card-content"><h3>VOICE</h3><p>나레이션</p></div></div>
            <div class="oracle-card" onclick="openModule('bgm')"><div class="card-content"><h3>BGM</h3><p>사운드</p></div></div>
            <div class="oracle-card" onclick="openModule('capcut')"><div class="card-content"><h3>CAPCUT</h3><p>조립</p></div></div>
            <div class="oracle-card" onclick="openModule('history')"><div class="card-content"><h3>HISTORY</h3><p>기록</p></div></div>
            <div class="oracle-card" onclick="openModule('manual')"><div class="card-content"><h3>MANUAL</h3><p>매뉴얼</p></div></div>
        </main>
    </div>

    <!-- v15 전용 워크스페이스 -->
    <div id="workspaceOverlay" class="workspace-overlay full-screen">
        <div class="workspace-panel mega-panel">
            <div class="workspace-header">
                <h2>v15 PREMIUM WORKSPACE</h2>
                <div class="header-actions">
                    <button class="save-btn-top" onclick="saveAllWorkspace()">💾 SAVE ALL</button>
                    <button class="close-btn" onclick="closeWorkspace()">✕ CLOSE</button>
                </div>
            </div>
            <div class="workspace-body scroll-gold">
                <!-- 벤치마킹 슬림화 (v15의 정수) -->
                <div class="ws-row url-section">
                    <div class="ws-col"><label class="ws-label gold-label">벤치마킹 타겟 URL (v15 슬림)</label>
                        <div class="url-input-group"><input type="text" class="url-input"><input type="text" class="url-input"><input type="text" class="url-input"></div>
                    </div>
                </div>
                <div class="ws-row engine-row" style="height: 480px !important;">
                    <div class="ws-col engine-box"><div class="engine-header"><label class="ws-label">1. 분석 엔진</label></div><div id="out-1" contenteditable="true" class="engine-output scroll-gold"></div></div>
                    <div class="ws-col engine-box"><div class="engine-header"><label class="ws-label">2. 주제 엔진</label></div><div id="out-2" contenteditable="true" class="engine-output scroll-gold"></div></div>
                    <div class="ws-col engine-box"><div class="engine-header"><label class="ws-label">3. 최종 시나리오</label></div><div id="out-3" contenteditable="true" class="engine-output scroll-gold"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var SERVER_URL = "http://127.0.0.1:5050";
        function openModule(name) { document.getElementById('workspaceOverlay').classList.add('active'); }
        function closeWorkspace() { document.getElementById('workspaceOverlay').classList.remove('active'); }
        function saveAllWorkspace() { alert("v15 마스터 저장 가동"); }
    </script>
</body>
</html>
