<!-- [현자의 거울: 리서치 모듈 프리미엄 v13 - v05 원형 완전 복구 확정본] -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE MIRROR | FINAL STABLE v13</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700;900&family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* [메가 채팅 전용 스타일] */
        .chat-open-btn {
            position: fixed; bottom: 30px; right: 30px;
            padding: 15px 30px; background: var(--gold-main); color: black;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); z-index: 100;
        }
        .chat-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .chat-container {
            width: 80%; height: 80%; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--gold-dim); border-radius: 20px;
            display: flex; flex-direction: column;
        }
        .chat-history { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 70%; padding: 15px 20px; border-radius: 15px; }
        .ai-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border-left: 3px solid var(--gold-main); }
        .user-msg { align-self: flex-end; background: var(--gold-dim); color: white; }
        .chat-input-area { padding: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; gap: 15px; }
        .chat-input { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 15px; color: white; }
    </style>
</head>
<body>
    <div class="nebula-bg"><div class="blob"></div></div>

    <header class="module-header">
        <div class="header-left"><h1>SAGE MIRROR v13 | FINAL STABLE</h1></div>
        <div class="header-right"><button class="global-rule-btn">GLOBAL RULE ▲</button></div>
    </header>

    <section class="top-grid">
        <div class="card-panel">
            <div class="panel-title"><span>OBSIDIAN SOURCE LIBRARY</span></div>
            <div class="library-grid">
                <div class="lib-card active" data-source="성경"><span class="check-mark">✔</span><span class="lib-icon">✝</span><span class="lib-name">성경</span></div>
                <div class="lib-card active" data-source="쇼펜하우어"><span class="check-mark">✔</span><span class="lib-icon">⚖</span><span class="lib-name">쇼펜하우어</span></div>
                <div class="lib-card" data-source="빅터 프랭클"><span class="check-mark">✔</span><span class="lib-icon">🕯</span><span class="lib-name">빅터 프랭클</span></div>
                <div class="lib-card" data-source="칼 융"><span class="check-mark">✔</span><span class="lib-icon">💠</span><span class="lib-name">칼 융</span></div>
            </div>
            <button onclick="runGemmaAnalysis()" class="global-rule-btn" style="margin-top:20px; width:100%; padding:15px; background:var(--gold-main); color:black; font-weight:bold;">✨ 오라클 분석 가동</button>
        </div>

        <div class="card-panel">
            <div class="panel-title"><span>SYSTEM STATUS</span></div>
            <div class="plan-item"><div class="plan-label" style="font-size:0.8rem;">📡 BRIDGE</div><div class="plan-value" style="color:var(--cyan-accent); font-size:1.1rem;">CONNECTED</div></div>
            <div class="plan-item"><div class="plan-label" style="font-size:0.8rem;">🤖 AI</div><div class="plan-value" style="font-size:1.1rem;">gemma4:e4b</div></div>
        </div>
    </section>

    <div class="center-banner"><span class="banner-text">SAGE MIRROR · ULTIMATE STUDIO RESTORED</span></div>

    <section class="bottom-grid">
        <div class="bench-list">
            <div class="panel-title"><span>I. BENCHMARKING</span></div>
            <div class="bench-item active" style="border-left-color: var(--gold-main);">
                <div class="bench-avatar">🧠</div>
                <div class="bench-info"><span class="name">체인지그라운드</span><span class="handle">성장/심리 마스터</span></div>
            </div>
        </div>
        <div class="director-panel">
            <div class="panel-title" style="color:var(--gold-dim);">SAGE MIRROR CORE</div>
            <div style="font-size:0.8rem; color:#666;">감독님의 영감을 현실로 만드는 공간입니다.</div>
        </div>
    </section>

    <div class="chat-open-btn" onclick="toggleChat()">💬 GEMMA MEGA CHAT</div>

    <div id="chat-modal" class="chat-modal">
        <div class="chat-container">
            <div class="chat-header" style="padding:20px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;">
                <span style="color:var(--gold-main); font-weight:bold;">🏛️ 현자의 오라클 : 메가 채팅</span>
                <button onclick="toggleChat()" style="background:none; border:1px solid #444; color:white; cursor:pointer;">CLOSE</button>
            </div>
            <div id="chat-history" class="chat-history"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" class="chat-input" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) sendMessage()">
                <button onclick="sendMessage()" style="background:var(--gold-main); border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">전송</button>
            </div>
        </div>
    </div>

    <script>
        var SERVER_URL = "http://127.0.0.1:5000";
        function toggleChat() {
            const modal = document.getElementById('chat-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }
        async function runGemmaAnalysis() { alert("분석 가동..."); }
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const history = document.getElementById('chat-history');
            const text = input.value.trim();
            if(!text) return;
            history.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = "";
            history.scrollTop = history.scrollHeight;
        }
        document.querySelectorAll('.lib-card').forEach(card => {
            card.onclick = function() { this.classList.toggle('active'); };
        });
    </script>
</body>
</html>
